<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stationery - Arshrozy Printing</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <header id="main-header">
        <div class="container">
            <div class="top-bar">
                <a href="index.html" class="logo">Arshrozy<span>Printing</span></a>
                <button id="mobile-menu-btn" style="display:none;">☰</button>
                <div class="contact-info"><strong>0769 752 124</strong></div>
            </div>
            <nav class="main-nav">
                <ul class="menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="marketing.html">Marketing</a></li>
                    <li><a href="banners.html">Banners</a></li>
                    <li><a href="stickers.html">Stickers</a></li>
                    <li><a href="business-cards.html">Cards</a></li>
                    <li><a href="stationery.html" class="active">Stationery</a></li>
                    <li><a href="mugs.html">Mugs</a></li>
                    <li><a href="apparel.html">Apparel</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1 class="section-title">Office Stationery</h1>
        <div class="product-split">
            <div class="image-side">
                <img src="https://via.placeholder.com/600x400?text=Stationery+Sample" alt="Stationery">
                <p style="margin-top:20px;">Receipt books, Invoice books, Letterheads, and Calendars. Essential for your office operations.</p>
            </div>
            <div class="calc-side">
                <h3>Get a Price Quote</h3>
                <form id="stat-form">
                    <div class="form-group">
                        <label>Item Type</label>
                        <select id="st-type">
                            <option value="receipt">Receipt Book (Self Carbon)</option>
                            <option value="invoice">Invoice Book</option>
                            <option value="calendar">Wall Calendar</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="st-qty" value="10" min="1">
                    </div>
                    <div class="total-box">
                        Total Estimate:
                        <span id="st-total" class="final-price">KES 0.00</span>
                    </div>
                    <button type="button" class="add-cart-btn">ADD TO CART</button>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
